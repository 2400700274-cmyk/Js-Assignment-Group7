<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Easy-Home</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body>
    <header>
    <div class="logo">ShopEasy</div>
    <nav>
      <a href="index.html">Home</a>
      <a href="Cart.html">Cart (<span id="cart-count">0</span>)</a>
      <a href="checkout.html">Checkout</a>
    </nav>
  </header>

  <main class="container">
    <h1>Welcome to ShopEasy</h1>
    <p class="subtitle">Browse our products and shop easily.</p>

    <section class="controls">
      <input type="text" id="search-input" placeholder="Search products by name...">

      <select id="category-filter">
        <option value="All">All Categories</option>
        <option value="Electronics">Electronics</option>
        <option value="Fashion">Fashion</option>
        <option value="Books">Books</option>
      </select>
    </section>

    <section id="product-container" class="product-grid"></section>
  </main>

  <script src="Script.js"></script>
</body>
</html>
